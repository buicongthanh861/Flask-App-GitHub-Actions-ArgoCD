apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo-app
  name: demo-app
  annotations:
    argocd-image-updater.argoproj.io/image-list: demo=congthanh19/demo-app
    argocd-image-updater.argoproj.io/demo.update-strategy: newest-build
    argocd-image-updater.argoproj.io/demo.allow-tags: regexp:^[a-f0-9]{40}$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: master
    argocd-image-updater.argoproj.io/demo.force-update: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  strategy: {}
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: congthanh19/demo-app:884ba7ec2c475e4c51bbc8c3170347d147fe6199
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources: {}
